services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-coloring}
      POSTGRES_USER: ${POSTGRES_USER:-coloring}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-coloring}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY_ID:-minioadmin}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_ACCESS_KEY:-minioadmin}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data

  api:
    build:
      context: ./apps/api
    env_file: .env
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    volumes:
      - ./apps/api:/app
    depends_on:
      - postgres
      - redis
      - minio

  worker:
    build:
      context: ./apps/api
    env_file: .env
    command: celery -A app.worker.celery_app worker --loglevel=info
    volumes:
      - ./apps/api:/app
    depends_on:
      - api
      - redis

  web:
    build:
      context: ./apps/web
    env_file: .env
    command: npm run dev -- --hostname 0.0.0.0
    ports:
      - "3000:3000"
    volumes:
      - ./apps/web:/app
      - /app/node_modules
    depends_on:
      - api

volumes:
  postgres-data:
  minio-data:
